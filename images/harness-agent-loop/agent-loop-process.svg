<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">什么是 Agent Loop</title>
  <desc id="desc">Agent 从用户目标开始，经过模型思考、调用工具、执行操作、获得结果并持续迭代直到完成。</desc>
  <defs>
    <linearGradient id="titleGradient" x1="0" x2="1"><stop offset="0" stop-color="#2457d6"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8faff"/><stop offset="1" stop-color="#f7f3ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#243b6b" flood-opacity="0.10"/></filter>
    <style>
      text{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#111827}
      .small{font-size:18px;fill:#4b5563}.label{font-size:22px;font-weight:700}.number{font-size:20px;font-weight:800;fill:#fff}.code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:18px}.arrow{font-size:36px;font-weight:700;fill:#111827}
    </style>
  </defs>
  <rect width="1200" height="760" rx="26" fill="#fff"/>
  <rect x="1.5" y="1.5" width="1197" height="757" rx="24.5" fill="none" stroke="#e5e7eb" stroke-width="3"/>
  <circle cx="58" cy="48" r="5" fill="#c7d2fe"/><circle cx="82" cy="48" r="5" fill="#c7d2fe"/><circle cx="106" cy="48" r="5" fill="#c7d2fe"/>
  <text x="60" y="105" font-size="54" font-weight="900">什么是 <tspan fill="url(#titleGradient)">Agent Loop</tspan>？</text>
  <text x="62" y="148" font-size="24" fill="#374151">Agent 不断“思考 → 行动 → 观察 → 再思考”的执行循环。</text>
  <g filter="url(#shadow)">
    <rect x="55" y="210" width="150" height="205" rx="22" fill="#f4fbf7" stroke="#9dd8b3" stroke-width="2"/>
    <rect x="245" y="210" width="150" height="205" rx="22" fill="#faf7ff" stroke="#c4b5fd" stroke-width="2"/>
    <rect x="435" y="210" width="150" height="205" rx="22" fill="#f5f8ff" stroke="#9ebcff" stroke-width="2"/>
    <rect x="625" y="210" width="150" height="205" rx="22" fill="#fffaf1" stroke="#f6c56e" stroke-width="2"/>
    <rect x="815" y="210" width="150" height="205" rx="22" fill="#f3fbfa" stroke="#8bd6c7" stroke-width="2"/>
    <rect x="1005" y="210" width="140" height="205" rx="22" fill="#faf7ff" stroke="#b9a8f6" stroke-width="2"/>
  </g>
  <g>
    <circle cx="130" cy="250" r="22" fill="#3ca56c"/><text x="130" y="257" text-anchor="middle" class="number">1</text>
    <circle cx="320" cy="250" r="22" fill="#7555d9"/><text x="320" y="257" text-anchor="middle" class="number">2</text>
    <circle cx="510" cy="250" r="22" fill="#356fd5"/><text x="510" y="257" text-anchor="middle" class="number">3</text>
    <circle cx="700" cy="250" r="22" fill="#f59e0b"/><text x="700" y="257" text-anchor="middle" class="number">4</text>
    <circle cx="890" cy="250" r="22" fill="#1fa891"/><text x="890" y="257" text-anchor="middle" class="number">5</text>
    <circle cx="1075" cy="250" r="22" fill="#6d4bd3"/><text x="1075" y="257" text-anchor="middle" class="number">6</text>
  </g>
  <g stroke-linecap="round" stroke-linejoin="round" stroke-width="7" fill="none">
    <circle cx="130" cy="315" r="23" fill="#4fb77d" stroke="none"/><path d="M88 374c7-29 27-42 42-42s35 13 42 42" fill="#4fb77d" stroke="none"/>
    <path d="M298 305c-15-18 3-37 18-24 6-17 30-13 30 5 18 0 23 25 8 33 10 18-12 34-27 20-10 14-34 3-28-15-18-2-20-28-1-32z" stroke="#7555d9"/>
    <path d="M485 325l52-52m-7 6l18-6-6 18M487 325l-18 18 20 20 18-18" stroke="#356fd5"/>
    <rect x="666" y="284" width="68" height="55" rx="7" stroke="#f59e0b"/><path d="M680 301h40M684 318l10 10-10 10" stroke="#f59e0b"/>
    <path d="M852 338h12v-32h-12zm24 0h12v-55h-12zm24 0h12v-78h-12" fill="#1fa891" stroke="#1fa891"/>
    <path d="M1050 303a30 30 0 1 1-3 38M1040 340h18v-18" stroke="#6d4bd3"/>
  </g>
  <g text-anchor="middle" class="label">
    <text x="130" y="395">用户目标</text><text x="320" y="395">模型思考</text><text x="510" y="395">调用工具</text><text x="700" y="395">执行操作</text><text x="890" y="395">获得结果</text><text x="1075" y="384">继续迭代</text><text x="1075" y="410" font-size="18" fill="#4b5563">直到完成</text>
  </g>
  <g class="arrow" text-anchor="middle"><text x="225" y="330">→</text><text x="415" y="330">→</text><text x="605" y="330">→</text><text x="795" y="330">→</text><text x="985" y="330">→</text></g>
  <path d="M1075 432v32c0 28-23 50-50 50H155c-28 0-50-22-50-50v-32" fill="none" stroke="#18233d" stroke-width="4"/>
  <path d="M105 432l-12 20h24z" fill="#18233d"/>
  <text x="600" y="505" text-anchor="middle" font-size="21" font-weight="700">将结果放回上下文，继续思考</text>
  <rect x="90" y="545" width="1020" height="145" rx="20" fill="url(#soft)" stroke="#d9ddf1" stroke-width="2"/>
  <circle cx="142" cy="596" r="30" fill="#ede9fe"/><text x="142" y="604" text-anchor="middle" font-size="26" font-weight="800" fill="#6d4bd3">&lt;/&gt;</text>
  <text x="195" y="580" font-size="25" font-weight="800" fill="#5b3fd0">伪代码示例</text>
  <text x="195" y="615" class="code" fill="#6d28d9">while (!done) {</text>
  <text x="390" y="615" class="code" fill="#1f3d8f">response = model.generate(context);</text>
  <text x="195" y="648" class="code" fill="#1f3d8f">executeTool(...); context.push(...);</text>
  <text x="580" y="648" class="code">}</text>
  <rect x="90" y="710" width="1020" height="1" fill="#fff"/>
  <text x="600" y="735" text-anchor="middle" font-size="22" font-weight="800" fill="#4c39c6">核心关注点：模型完成当前一步后，接下来做什么？</text>
</svg>